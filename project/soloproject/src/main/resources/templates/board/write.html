<!DOCTYPE html>
<html lang="ko" xmlns="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>게시글 작성</title>
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<link rel="stylesheet" th:href="@{/css/write.css}">
</head>

<body>

	<!-- 공통 네비게이션 바  -->
	<nav th:replace="~{fragments/layout :: nav}"></nav>


	<!-- 메인 영역 -->
	<div class="container">
		<h2>게시글 작성</h2>

		<!-- 게시글 작성 폼 -->
		<form class="write-form" th:action="@{/board/write}" method="post">

			<!-- 카테고리 선택 폼 -->
			<select name="boardCategory" id="boardCategory" class="category-select">
				<option value="category">카테고리</option>
				<option value="new" th:if="${session.loginMember.memberRating == 0}">가입인사</option>
				<option value="free" th:if="${session.loginMember.memberRating == 1}">자유게시판</option>
				<option value="question" th:if="${session.loginMember.memberRating == 1}">질문게시판</option>
			</select>
			
			<!-- 위의 폼에서 카테고리 미선택시 출력 -->
			<div class="error-msg" th:if="${error == 'categorySelect'}">
				카테고리를 선택해주세요.
			</div>

			
			<div class="form-group">
				<label for="boardTitle">제목</label>
				<input type="text" id="boardTitle" name="boardTitle" placeholder="제목을 입력하세요" required>
			</div>

			<div class="form-group">
				<label for="boardContent">내용</label>
				<!--
                name="boardContent" — BoardDTO.boardContent 필드에 자동 매핑
            -->
				<textarea id="boardContent" name="boardContent" rows="14" placeholder="내용을 입력하세요" required></textarea>
			</div>

			<div class="form-actions">
				<button type="submit" class="btn btn-primary">등록</button>
				<a th:href="@{/board/community}" class="btn btn-secondary">취소</a>
			</div>

		</form>
	</div>
</body>

</html>
