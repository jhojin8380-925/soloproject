<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>게시글 상세보기</title>
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<link rel="stylesheet" th:href="@{/css/detail.css}">
</head>

<body>

	<!-- 공통 네비게이션 바  -->
	<nav th:replace="~{fragments/layout :: nav}"></nav>

	<!-- 메인 영역 -->
	<div class="container">

		<!-- ===== 게시글 본문 ===== -->
		<div class="board-detail">
			<h2 th:txet="${board.boardTitle}">제목</h2>

			<div class="board-meta">
				<span>작성자: <strong th:text="${board.memberLoginId}">아이디</strong></span>
				<span>날짜: <span th:text="${board.boardDate}">날짜</span></span>
				<span>조회수: <span th:text="${board.boardHit}">0</span></span>
			</div>

			<div class="board-content" th:text="${board.boardContent}">내용</div>

			<!-- 수정·삭제 버튼 — 작성자 본인(hong)이 로그인한 경우에만 표시 -->
			<div class="board-actions"
				th:if="${session.loginMember != null and session.loginMember.memberId == board.memberId}">
				<a th:href="@{/board/update/{id}(id=${board.boardId})}" class="btn btn-secondary">수정</a>
				<!-- 삭제할 게시판 ID를 POST 방식으로 전달하여 DB에서 해당 게시글 삭제 -->
				<form th:action="@{/board/delete/{id}(id=${board.boardId})}" method="post" style="display:inline"
					onsubmit="return (confirm('정말 삭제하시겠습니까?'))">
					<button class="btn btn-danger" type="submit">삭제</button>
				</form>
				<a th:href="@{/board/community}" class="btn">목록으로</a>
			</div>

			
		</div>

		<!-- ===== 댓글 영역 ===== -->
		<div class="comment-section">
			<h3>댓글 <span id="commentCount">3</span>개</h3>

			<div id="commentList">
				<!-- 댓글 1 — 본인 댓글 (삭제 버튼 있음) -->
				<div class="comment-item" id="comment-1">
					<span class="comment-author">hong</span>
					<span class="comment-content">좋은 정리 감사합니다! 많은 도움이 됐어요.</span>
					<span class="comment-date">2025-05-31 11:00:12</span>
					<button class="btn btn-sm btn-danger"
						onclick="if(confirm('댓글을 삭제하시겠습니까?')) this.closest('.comment-item').remove()">삭제</button>
				</div>

				<!-- 댓글 2 — 타인 댓글 (삭제 버튼 없음) -->
				<div class="comment-item" id="comment-2">
					<span class="comment-author">kim</span>
					<span class="comment-content">저도 이 방법으로 연동했는데 잘 됐어요!</span>
					<span class="comment-date">2025-05-31 13:22:05</span>
				</div>

				<!-- 댓글 3 — 타인 댓글 -->
				<div class="comment-item" id="comment-3">
					<span class="comment-author">lee</span>
					<span class="comment-content">map-underscore-to-camel-case 설정 덕분에 매핑이 훨씬 편해졌네요.</span>
					<span class="comment-date">2025-05-31 15:44:30</span>
				</div>
			</div>

			<!-- 댓글 작성 폼 — 로그인 상태에서만 표시 -->
			<div class="comment-form">
				<textarea id="commentContent" rows="3" placeholder="댓글을 입력하세요 (최대 500자)" maxlength="500"></textarea>
				<button class="btn btn-primary" onclick="alert('댓글 등록 (AJAX)')">댓글 등록</button>
			</div>

			<!-- 비로그인 상태일 때 표시 (위 comment-form 대신) -->
			<!--
        <div class="login-required">
            <a href="05_login.html">로그인</a> 후 댓글을 작성할 수 있습니다.
        </div>
        -->
		</div>

	</div>
</body>

</html>
