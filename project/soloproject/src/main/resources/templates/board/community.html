<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/community.css}">
    <script defer th:src="@{/js/community.js}"></script>
</head>
<body>

<!-- 공통 네비게이션 바  -->
<nav th:replace="~{fragments/layout :: nav}"></nav>
       
    <!-- =============================================================== -->
    <!-- 메인 영역 -->
<div class="container">
    <!-- 무슨 카테고리 인지 표시 -->
    <div>
        <h2 class="category-text">커뮤니티</h2> 
        <!-- 카테고리에 따라 변화 -->
    </div>
    
    <!-- 카테고리 선택 영역 -->
     <!-- 카테고리 선택시 community/{category} 로 이동 함 -->
    <div class="board-category">
        <ul class="category-ul">
            <li class="category-li">
				<!--<a th:href="@{/board/detail/{id}(id=${board.boardId})}"-->
                <a th:href="@{/board/community?category=all}" class="category-link">전체보기</a>
            </li>
            <li class="category-li">
                <a th:href="@{/board/community?category=new}" class="category-link">가입인사</a>
            </li>
            <li class="category-li">
                <a th:href="@{/board/community?category=free}" class="category-link">자유게시판</a>
            </li>
            <li class="category-li">
                <a th:href="@{/board/community?category=question}" class="category-link">질문게시판</a>
            </li>
        </ul>
    </div>

    <!-- ===== 게시글 목록 테이블 ===== -->
    <table class="board-table">
        <thead>
            <tr>
                <th style="width:70px">번호</th>
				<th style="width:100px">카테고리</th>
                <th>제목</th>
                <th style="width:100px">작성자</th>
                <th style="width:120px">날짜</th>
                <th style="width:70px">조회수</th>
            </tr>
        </thead>
        <tbody>
			<!-- 게시글이 없을 때 -->
			<tr th:if="${#lists.isEmpty(boardList)}">
				<td colspan="6" class="no-data">등록된 게시글이 없습니다.</td>
			</tr>
			<!-- 게시글이 있을 때 -->
			<tr th:each="board : ${boardList}">
			    <td th:text="${board.boardId}"></td>
				<td th:text="${board.boardCategory}"></td>
			    <td>
					<a th:href="@{/board/detail/{id}(id=${board.boardId})}"
					   th:text="${board.boardTitle}"></a>
				</td>
			    <td th:text="${board.memberLoginId}"></td>
			    <td th:text="${board.boardDate}"></td>
			    <td th:text="${board.boardHit}"></td>
			</tr>
        </tbody>
    </table>
    <!-- ===== 글쓰기 버튼 (로그인 상태에서만 표시) ===== -->
    <div class="write-btn-area">
        <a href="@{/board/write}" class="btn btn-primary">게시글 쓰기</a>
    </div>

    <!-- 검색 결과 안내 (검색 중일 때만 표시) -->
    <!-- <p class="search-keyword">'Spring' 검색 결과</p> -->
    <!-- ===== 검색 폼 ===== -->
    <form class="search-form" th:action="@{/board/community}" method="get">
        <input type="text" name = "keyword"
		placeholder="제목 또는 작성자 검색" th:value="${keyword}">
        <button type="submit" class="btn btn-secondary">검색</button>
        <!-- 검색 중일 때만 전체보기 버튼 표시 -->
        <!-- <a href="01_list.html" class="btn">전체보기</a> -->
    </form>

    <!-- ===== 페이징 ===== -->
	<div class="pagination">
	        <a th:if = "${currentPage > 1}" 
				th:href="@{/board/list(page=${currentPage - 1}, keyword=${keyword})}">◀ 이전</a>
	        <a th:each="i : ${#numbers.sequence(1, totalPages)}"
			   th:href="@{/board/list(page=${i}, keyword=${keyword})}"
			   th:text="${i}"
			   th:class="${i == currentPage} ? 'active' : ''"></a>
	        <a th:if="${currentPage < totalPages}" 
				th:href="@{/board/list(page=${currentPage + 1}, keyword=${keyword})}">다음 ▶</a>
	</div>

</div>

<!-- 푸터 영역 -->
<footer>
    
</footer>

</body>
</html>
