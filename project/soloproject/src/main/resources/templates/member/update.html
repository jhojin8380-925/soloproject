<!DOCTYPE html>
<html lang="ko" xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 정보 수정</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/member-update.css}">
</head>
<body>

	<!-- 공통 네비게이션 바  -->
	<nav th:replace="~{fragments/layout :: nav}"></nav>
	
    <!-- 회원 정보 수정 폼 -->
     <div class="container-sm">
    <h2>회원정보 수정</h2>
	
	<!-- 비밀번호 칸과 비밀번호 확인 칸이 다를경우 출력 -->
	<div th:if="${error == 'pwderror'}" class="error-msg">
	    입력하신 비밀번호가 다릅니다. 비밀번호를 확인해주세요.
	</div>
    
   	<!-- 회원 정보 수정 폼 -->
    <form action="#" method="post">

        <div class="form-group">
			<input type="hidden"
				   id="memberId"
				   name="memberId"
				   th:value="${session.loginMember.memberId}">			
            <label for="memberLoginId">아이디 <span style="color: red;">*</span></label>
            <!-- name="memberLoginId" → MemberDTO.memberLoginId -->
            <input type="text"
                   id="memberLoginId"
                   name="memberLoginId"
                   th:value="${session.loginMember.memberLoginId}"
                   readonly>
        </div>

        <div class="form-group">
            <label for="memberName">이름 <span style="color: red;">*</span></label>
            <!-- name="memberName" → MemberDTO.memberName -->
            <input type="text"
                   id="memberName"
                   name="memberName"
                   th:value="${session.loginMember.memberName}" 
                   required>
        </div>

        <div class="form-group">
            <label for="memberEmail">이메일 <span style="color: red;">*</span></label>
            <!-- name="memberEmail" → MemberDTO.memberEmail -->
            <input type="email"
                   id="memberEmail"
                   name="memberEmail"
                   th:value="${session.loginMember.memberEmail}"
                   required>
        </div>

        <div class="form-group">
            <label for="memberPwd">비밀번호 <span style="color: red;">*</span></label>
            <!-- name="memberPwd" → MemberDTO.memberPwd -->
            <input type="password"
                   id="memberPwd"
                   name="memberPwd"
                   th:value="${session.loginMember.memberPwd}"
                   required>
        </div>
        <!-- 비밀번호 확인용 -->
        <div class="form-group">
            <label for="memberPwd2">비밀번호 확인 <span style="color: red;">*</span></label>
            <!-- name="memberPwd" → MemberDTO.memberPwd -->
            <input type="password"
                   id="memberPwd2"
                   name="memberPwd2"
                   th:value="${session.loginMember.memberPwd}"
                   required>
        </div>

        <div class="form-group">
            <label for="memberPhone">전화번호</label>
            <!-- name="memberPhone" → MemberDTO.memberPhone (선택 항목) -->
            <input type="text"
                   id="memberPhone"
                   name="memberPhone"
                   th:value="${session.loginMember.memberPhone}">
        </div>
        <div class="form-footer">
            <a th:href="@{/member/mypage}" class="btn btn-secondary">취소</a>
            <button type="submit" class="btn btn-primary">수정하기</button>
        </div>        
    </form>
</body>
</html>
