<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 정보 수정</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/member-update.css">
</head>
<body>

    <!-- 공통 네비게이션 바  -->
<nav class="nav-bar">
        
    <a class="nav-title" href="./04_community.html">커뮤니티 게시판</a>

    <div class="nav-links">
        
        <a href="./01_login.html">로그인</a>
        <a href="./02_join.html">회원가입</a>
    </div>
</nav> 

    <!-- 회원 정보 수정 폼 -->
     <div class="container-sm">
    <h2>회원정보 수정</h2>
    
    <!--
        action="/member/join" — POST /member/join 으로 폼 전송
        폼의 각 input name 속성값이 MemberDTO 필드명과 일치해야
        Spring이 자동으로 MemberDTO 객체에 값을 채워줌
    -->
    <form action="#" method="post">

        <div class="form-group">
            <label for="memberLoginId">아이디 <span style="color: red;">*</span></label>
            <!-- name="memberLoginId" → MemberDTO.memberLoginId -->
            <input type="text"
                   id="memberLoginId"
                   name="memberLoginId"
                   value="hong"
                   readonly>
        </div>

        <div class="form-group">
            <label for="memberName">이름 <span style="color: red;">*</span></label>
            <!-- name="memberName" → MemberDTO.memberName -->
            <input type="text"
                   id="memberName"
                   name="memberName"
                   value="홍길동" 
                   required>
        </div>

        <div class="form-group">
            <label for="memberEmail">이메일 <span style="color: red;">*</span></label>
            <!-- name="memberEmail" → MemberDTO.memberEmail -->
            <input type="email"
                   id="memberEmail"
                   name="memberEmail"
                   value="hong@example.com"
                   required>
        </div>

        <div class="form-group">
            <label for="memberPwd">비밀번호 <span style="color: red;">*</span></label>
            <!-- name="memberPwd" → MemberDTO.memberPwd -->
            <input type="password"
                   id="memberPwd"
                   name="memberPwd"
                   value="1234"
                   required>
        </div>
        <!-- 비밀번호 확인용 -->
        <div class="form-group">
            <label for="memberPwd2">비밀번호 확인 <span style="color: red;">*</span></label>
            <!-- name="memberPwd" → MemberDTO.memberPwd -->
            <input type="password"
                   id="memberPwd2"
                   name="memberPwd2"
                   value="1234"
                   required>
        </div>

        <div class="form-group">
            <label for="memberPhone">전화번호</label>
            <!-- name="memberPhone" → MemberDTO.memberPhone (선택 항목) -->
            <input type="text"
                   id="memberPhone"
                   name="memberPhone"
                   value="010-1111-1111">
        </div>
        <div class="form-footer">
            <a href="./08_member_mypage.html" class="btn btn-secondary">취소</a>
            <button type="submit" class="btn btn-primary">수정하기</button>
        </div>        
    </form>
</body>
</html>
